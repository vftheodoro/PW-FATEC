<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galeria de Fotos</title>
  </head>
  <body>
    <header>
      <h1>Galeria de Fotos</h1>
      <p>Galeria de fotos</p>
    </header>

    <main>
      <!--Importando Imagens Locais-->
      <section>
        <img src="midias/imagem.jpg" alt="paisagem bonita" />
      </section>

      <br /><br /><br />

      <!--Importando Imagens Externas-->
      <section>
        <img src="https://picsum.photos/id/237/200/300" alt="imagem 1" />
        <img src="https://picsum.photos/id/240/200/300" alt="imagem 2" />
        <img src="https://picsum.photos/id/221/200/300" alt="imagem 3" />
        <img src="https://picsum.photos/id/250/200/300" alt="imagem 4" />
        <img src="https://picsum.photos/id/250/200/300" alt="imagem 5" />
        <img src="https://picsum.photos/id/123/200/300" alt="imagem 6" />
        <img src="https://picsum.photos/id/100/200/300" alt="imagem 7" />
        <img src="https://picsum.photos/id/130/200/300" alt="imagem 8" />
        <img src="https://picsum.photos/id/300/200/300" alt="imagem 9" />
        <img src="https://picsum.photos/id/321/200/300" alt="imagem 10" />
        <img src="https://picsum.photos/id/400/200/300" alt="imagem 11" />
        <img src="https://picsum.photos/id/410/200/300" alt="imagem 12" />
      </section>

      <br /><br /><br />

      <!--Imagens com Legenda-->
      <section>
        <figure>
          <img src="midias/grafico.png" alt="Grafico da Empresa" />
          <figcaption>Grafico da Empresa</figcaption>
        </figure>
      </section>
    </main>
    
    <hr>
    <footer>
        <p>Desenvolvido por: Theodoro</p>
    </footer>

  </body>
</html>
