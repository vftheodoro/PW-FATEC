<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras Midias</title>
</head>
<body>
    
<header>
    <h1>Outras Midias</h1>
    <p>Outras Midias no HTML5</p>
</header>

<main>
    <section>
        <h2>Áudio</h2>
        <audio src="midias/audio.mp3" controls></audio>
    </section>

    <section>
        <h2>Vídeo</h2>
        <video src="midias/video.mp4" controls type="video/mp4" width="400"></video>
    </section>

    <section>
        <h2>Video do Youtube</h2>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/VIDEO_ID" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </section>

</main>

</body>
</html>
